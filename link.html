<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>심부름 - 정보 입력</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=3f844ae21d13ada271e544607d9c18b4&libraries=services"></script>
<style>
  :root { --brand: #FF4B2B; }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fff; color: #1a1a1a; }
  #app { max-width: 480px; margin: 0 auto; padding: 20px; min-height: 100vh; }

  .logo { font-size: 20px; font-weight: 900; margin-bottom: 20px; }
  .logo .b { color: var(--brand); }

  h1 { font-size: 22px; font-weight: 800; line-height: 1.4; margin-bottom: 10px; }
  .sub { font-size: 14px; color: #777; line-height: 1.5; margin-bottom: 20px; }

  .secure { background: #FFF2F0; border: 1px solid var(--brand); border-radius: 12px; padding: 14px 16px; font-size: 13px; color: #a3331f; font-weight: 600; margin-bottom: 24px; line-height: 1.4; }

  label.fl { display: block; font-size: 13px; font-weight: 700; color: #333; margin: 16px 0 8px; }
  input[type=text], input[type=tel] { width: 100%; background: #f7f7f8; border: 1.5px solid #eee; border-radius: 12px; padding: 14px 16px; font-size: 15px; color: #1a1a1a; }
  input:focus { outline: none; border-color: var(--brand); background: #fff; }

  .search-row { display: flex; gap: 8px; }
  .search-row input { flex: 1; }
  .search-btn { background: #1a1a1a; color: #fff; border: none; border-radius: 12px; padding: 0 16px; font-size: 14px; font-weight: 700; white-space: nowrap; cursor: pointer; }

  .results { margin-top: 8px; }
  .result-item { padding: 12px 14px; background: #f7f7f8; border-radius: 10px; margin-bottom: 6px; font-size: 14px; cursor: pointer; }
  .result-item:active { background: #ffe9e4; }
  .result-sub { font-size: 11px; color: #999; margin-top: 2px; }

  .selected-addr { background: #fff5f3; border: 1px solid #ffd9d0; border-radius: 10px; padding: 12px 14px; font-size: 14px; font-weight: 600; color: var(--brand); margin-top: 8px; }

  .file-btn { display: block; width: 100%; background: #f7f7f8; border: 1.5px dashed #ccc; border-radius: 12px; padding: 20px; text-align: center; font-size: 14px; color: #777; cursor: pointer; }
  .file-btn.has { border-style: solid; border-color: var(--brand); color: var(--brand); font-weight: 700; }
  .photo-preview { width: 100%; border-radius: 12px; margin-top: 10px; }

  .dm-row { display: flex; gap: 10px; margin-top: 8px; }
  .dm-card { flex: 1; background: #f7f7f8; border: 1.5px solid #eee; border-radius: 12px; padding: 16px 10px; text-align: center; cursor: pointer; position: relative; }
  .dm-card .dm-emoji { font-size: 28px; }
  .dm-card .dm-text { font-size: 14px; font-weight: 700; color: #333; margin-top: 6px; }
  .dm-card.on { border-color: var(--brand); background: #fff5f3; }
  .dm-card.on .dm-text { color: var(--brand); }
  .dm-card .dm-check { display: none; position: absolute; top: 8px; right: 8px; width: 20px; height: 20px; border-radius: 50%; background: var(--brand); color: #fff; font-size: 12px; align-items: center; justify-content: center; }
  .dm-card.on .dm-check { display: flex; }
  textarea.memo { width: 100%; background: #f7f7f8; border: 1.5px solid #eee; border-radius: 12px; padding: 14px 16px; font-size: 15px; color: #1a1a1a; resize: none; font-family: inherit; }
  textarea.memo:focus { outline: none; border-color: var(--brand); background: #fff; }

  .consent { margin-top: 20px; }
  .consent-row { display: flex; align-items: center; gap: 10px; cursor: pointer; }
  .checkbox { width: 24px; height: 24px; border-radius: 7px; border: 2px solid #ddd; display: flex; align-items: center; justify-content: center; font-size: 13px; color: #fff; flex-shrink: 0; }
  .checkbox.on { background: var(--brand); border-color: var(--brand); }
  .consent-label { font-size: 14px; color: #333; font-weight: 600; }
  .consent-toggle { font-size: 12px; color: #aaa; text-decoration: underline; margin-left: auto; cursor: pointer; }
  .consent-detail { display: none; background: #f7f7f8; border-radius: 10px; padding: 14px; font-size: 12px; color: #666; line-height: 1.6; margin-top: 10px; white-space: pre-line; }

  .submit-btn { width: 100%; height: 56px; background: var(--brand); color: #fff; border: none; border-radius: 14px; font-size: 17px; font-weight: 800; margin-top: 28px; cursor: pointer; }
  .submit-btn:disabled { opacity: 0.4; }

  .center { text-align: center; padding-top: 80px; }
  .center .emoji { font-size: 64px; margin-bottom: 16px; }
  .center h2 { font-size: 22px; font-weight: 800; margin-bottom: 10px; }
  .center p { font-size: 15px; color: #777; line-height: 1.5; }
  .loading { text-align: center; padding-top: 100px; color: #999; font-size: 15px; }
</style>
</head>
<body>
<div id="app"><div class="loading">불러오는 중...</div></div>

<script>
const SUPABASE_URL = 'https://sppvrikqjufrdsrfcokx.supabase.co';
const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNwcHZyaWtxanVmcmRzcmZjb2t4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5OTA5NTMsImV4cCI6MjA5NTU2Njk1M30.hjFGqgmIz_CP3MWUZwGwEXKsnvL4DOPNgbOOCMpcX74';
const KAKAO_KEY = 'c4a50cf5481e645d7059d27026046d61';
const sb = supabase.createClient(SUPABASE_URL, ANON_KEY);

let order = null;
let selectedItem = null;   // 선택된 카카오 주소 doc
let photoFile = null;      // buy: 물건 사진
let selectedDeliveryType = null;  // 수령 방법: 'door_hanger' | 'direct'
let consentChecked = false;
let submitting = false;
let code = '';

const app = document.getElementById('app');
const esc = (s) => (s == null ? '' : String(s)).replace(/</g, '&lt;').replace(/>/g, '&gt;');

function calcDistance(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function getShortCode() {
  const m = location.pathname.match(/\/p\/([^\/?#]+)/);
  if (m) return m[1];
  return new URLSearchParams(location.search).get('code') || '';
}

async function init() {
  code = getShortCode();
  if (!code) { renderError('잘못된 접근이에요.'); return; }

  const { data, error } = await sb
    .from('orders')
    .select('id, order_type, orderer_nickname, status, delivery_lat, delivery_lng, buyer_id, short_code')
    .eq('short_code', code)
    .maybeSingle();

  if (error || !data) { renderError('링크 정보를 찾을 수 없어요.'); return; }
  if (data.status !== 'link_pending') { renderError('이미 처리된 링크입니다.'); return; }

  order = data;
  renderForm();
}

function renderError(msg) {
  app.innerHTML = `<div class="center"><div class="emoji">🔗</div><h2>${esc(msg)}</h2><p>주문자에게 다시 문의해주세요.</p></div>`;
}

function renderForm() {
  const isBuy = order.order_type === 'buy';
  const nick = esc(order.orderer_nickname || '주문자');
  const title = isBuy
    ? `${nick}님이 물건을 받기 위해 기다리고 있어요! 🎁`
    : `${nick}님이 물건을 보내려고 기다리고 있어요! 📦`;
  const sub = isBuy
    ? '보내는 분의 정보를 입력해주시면 기사님이 픽업하러 방문할게요 🛵'
    : '받는 분의 정보를 입력해주시면 기사님이 배송해드릴게요 🛵';

  const consentDetail = isBuy
    ? '수집항목: 이름, 전화번호, 주소, 물건사진\n수집목적: 배송 서비스 제공\n보유기간: 배송 완료 후 즉시 삭제\n제공: 심부름 기사님 (배송 중만 제공, 완료 후 즉시 삭제)'
    : '수집항목: 이름, 전화번호, 주소\n수집목적: 배송 서비스 제공\n보유기간: 배송 완료 후 즉시 삭제\n제공: 심부름 기사님 (배송 중만 제공, 완료 후 즉시 삭제)';

  const addrLabel = isBuy ? '픽업 주소' : '배송 주소';

  app.innerHTML = `
    <div class="logo">🛵 심부름<span class="b">.</span></div>
    <h1>${title}</h1>
    <div class="sub">${sub}</div>
    <div class="secure">🔒 입력하신 주소와 연락처는 상대방에게 절대 공개되지 않아요</div>

    <label class="fl">닉네임 <span style="color:var(--brand)">*</span></label>
    <input type="text" id="nickname" placeholder="닉네임" maxlength="20">

    <label class="fl">전화번호 <span style="color:var(--brand)">*</span></label>
    <input type="tel" id="phone" placeholder="01012345678" maxlength="11" inputmode="numeric">

    <label class="fl">${addrLabel} <span style="color:var(--brand)">*</span></label>
    <button type="button" class="search-btn" id="search-btn" style="width:100%;padding:14px;">📍 주소 검색</button>
    <div id="selected-addr"></div>

    <label class="fl">상세주소</label>
    <input type="text" id="detail" placeholder="동/호수 등">

    <label class="fl">수령 방법 <span style="color:var(--brand)">*</span></label>
    <div class="dm-row">
      <div class="dm-card" data-type="door_hanger">
        <div class="dm-check">✓</div>
        <div class="dm-emoji">🚪</div>
        <div class="dm-text">문고리걸기</div>
      </div>
      <div class="dm-card" data-type="direct">
        <div class="dm-check">✓</div>
        <div class="dm-emoji">🤝</div>
        <div class="dm-text">직접전달</div>
      </div>
    </div>

    <label class="fl">${isBuy ? '기사 요청사항' : '배송 요청사항'}</label>
    <textarea class="memo" id="memo" rows="2" maxlength="100" placeholder="예: 문 앞에 놔주세요, 조심히 다뤄주세요"></textarea>

    ${isBuy ? `
    <label class="fl">물건 사진 <span style="color:var(--brand)">*</span></label>
    <div class="file-btn" id="file-label">📷 사진 업로드</div>
    <input type="file" id="photo" accept="image/*" style="display:none;">
    <img id="photo-preview" class="photo-preview" style="display:none;">
    ` : ''}

    <div class="consent">
      <div class="consent-row">
        <div class="checkbox" id="consent-cb"></div>
        <span class="consent-label">개인정보 수집·이용 동의 (필수)</span>
        <span class="consent-toggle" id="consent-toggle">펼쳐보기</span>
      </div>
      <div class="consent-detail" id="consent-detail">${consentDetail}</div>
    </div>

    <button class="submit-btn" id="submit-btn" disabled>입력 완료</button>
  `;

  // 이벤트 바인딩
  document.getElementById('search-btn').onclick = openPostcode;
  document.getElementById('nickname').addEventListener('input', updateButton);
  const phoneEl = document.getElementById('phone');
  phoneEl.addEventListener('input', () => { phoneEl.value = phoneEl.value.replace(/[^0-9]/g, ''); updateButton(); });

  document.getElementById('consent-cb').parentElement.onclick = (e) => {
    if (e.target.id === 'consent-toggle') return;
    consentChecked = !consentChecked;
    const cb = document.getElementById('consent-cb');
    cb.classList.toggle('on', consentChecked);
    cb.textContent = consentChecked ? '✓' : '';
    updateButton();
  };
  document.getElementById('consent-toggle').onclick = () => {
    const d = document.getElementById('consent-detail');
    d.style.display = d.style.display === 'block' ? 'none' : 'block';
  };

  // 수령 방법 선택
  document.querySelectorAll('.dm-card').forEach(card => {
    card.onclick = () => {
      selectedDeliveryType = card.dataset.type;
      document.querySelectorAll('.dm-card').forEach(c => c.classList.remove('on'));
      card.classList.add('on');
      updateButton();
    };
  });

  if (isBuy) {
    const fileInput = document.getElementById('photo');
    // 사진 클릭 시 수령 방법 확인
    document.getElementById('file-label').onclick = () => {
      if (!selectedDeliveryType) { alert('먼저 수령 방법을 선택해주세요'); return; }
      if (selectedDeliveryType === 'door_hanger') {
        alert('문고리에 물건을 걸어두신 후 사진을 찍어주세요 📦');
      } else {
        alert('포장 후 물건 사진을 찍어주세요 📦');
      }
      fileInput.click();
    };
    fileInput.addEventListener('change', () => {
      const f = fileInput.files[0];
      if (!f) return;
      photoFile = f;
      const label = document.getElementById('file-label');
      label.classList.add('has');
      label.textContent = '✓ 사진 선택됨';
      const prev = document.getElementById('photo-preview');
      prev.src = URL.createObjectURL(f);
      prev.style.display = 'block';
      updateButton();
    });
  }

  document.getElementById('submit-btn').onclick = handleSubmit;
}

function geocodeAddress(addr) {
  return new Promise((resolve) => {
    try {
      const geocoder = new kakao.maps.services.Geocoder();
      geocoder.addressSearch(addr, (result, status) => {
        if (status === kakao.maps.services.Status.OK && result[0]) {
          resolve({ lat: parseFloat(result[0].y), lng: parseFloat(result[0].x) });
        } else {
          resolve(null);
        }
      });
    } catch (e) {
      resolve(null);
    }
  });
}

function openPostcode() {
  new daum.Postcode({
    oncomplete: async (data) => {
      const addr = data.roadAddress || data.jibunAddress;
      const gu = data.sigungu;
      const dong = data.bname;

      // buy: 서비스 지역 체크
      if (order.order_type === 'buy') {
        const { data: area } = await sb.from('service_areas').select('is_open').eq('district', gu).maybeSingle();
        if (!area || !area.is_open) {
          alert('현재 서비스 가능 지역이 아닙니다 🙏');
          selectedItem = null;
          document.getElementById('selected-addr').innerHTML = '';
          updateButton();
          return;
        }
      }

      const coords = await geocodeAddress(addr);
      selectedItem = { addr, gu, dong, lat: coords?.lat ?? null, lng: coords?.lng ?? null };
      document.getElementById('selected-addr').innerHTML = `<div class="selected-addr">📍 ${esc(addr)}</div>`;
      updateButton();
    }
  }).open();
}

function updateButton() {
  const nickname = document.getElementById('nickname')?.value.trim();
  const phone = document.getElementById('phone')?.value.trim();
  const isBuy = order.order_type === 'buy';
  let ok = nickname && phone && phone.length >= 10 && selectedItem && consentChecked && selectedDeliveryType;
  if (isBuy) ok = ok && !!photoFile;
  document.getElementById('submit-btn').disabled = !ok;
}

async function handleSubmit() {
  if (submitting) return;
  const btn = document.getElementById('submit-btn');
  const isBuy = order.order_type === 'buy';

  const nickname = document.getElementById('nickname').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const detail = document.getElementById('detail').value.trim();
  const memo = document.getElementById('memo')?.value.trim() || '';
  if (!nickname || !phone || phone.length < 10 || !selectedItem || !consentChecked || !selectedDeliveryType || (isBuy && !photoFile)) {
    alert('모든 필수 항목을 입력해주세요.');
    return;
  }

  submitting = true;
  btn.disabled = true;
  btn.textContent = '처리 중...';

  try {
    const addr = selectedItem.addr;
    const fullAddr = detail ? `${addr} ${detail}` : addr;
    const lat = selectedItem.lat;
    const lng = selectedItem.lng;
    const gu = selectedItem.gu;
    const dong = selectedItem.dong;

    if (isBuy) {
      // 물건 사진 업로드
      const fileName = `seller_${Date.now()}.jpg`;
      const { error: upErr } = await sb.storage.from('order-photos').upload(fileName, photoFile, { upsert: true, contentType: photoFile.type || 'image/jpeg' });
      if (upErr) throw upErr;
      const { data: urlData } = sb.storage.from('order-photos').getPublicUrl(fileName);
      const photoUrl = urlData.publicUrl;

      const distance = (order.delivery_lat != null && order.delivery_lng != null)
        ? calcDistance(lat, lng, order.delivery_lat, order.delivery_lng)
        : null;

      await sb.from('orders').update({
        seller_address: fullAddr,
        seller_phone: phone,
        pickup_lat: lat,
        pickup_lng: lng,
        pickup_gu: gu,
        pickup_dong: dong,
        seller_item_photo_url: photoUrl,
        distance_km: distance,
        sender_delivery_type: selectedDeliveryType,
        sender_memo: memo,
        link_completed_at: new Date().toISOString(),
        status: 'waiting',
      }).eq('short_code', order.short_code);
    } else {
      await sb.from('orders').update({
        buyer_address: fullAddr,
        buyer_phone: phone,
        delivery_lat: lat,
        delivery_lng: lng,
        delivery_dong: dong,
        receiver_delivery_type: selectedDeliveryType,
        receiver_memo: memo,
        link_completed_at: new Date().toISOString(),
        status: 'waiting',
      }).eq('short_code', order.short_code);
    }

    // dispatch 호출 (주문자 푸시는 dispatch 내부에서 처리)
    fetch(`${SUPABASE_URL}/functions/v1/dispatch`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${ANON_KEY}` },
      body: JSON.stringify({
        orderId: order.id,
        notifyOrderer: true,
        orderType: order.order_type,
      }),
    });

    renderDone();
  } catch (e) {
    console.error(e);
    alert('처리 중 오류가 발생했어요. 다시 시도해주세요.');
    submitting = false;
    btn.disabled = false;
    btn.textContent = '입력 완료';
  }
}

function renderDone() {
  app.innerHTML = `
    <div class="center">
      <div class="emoji">🎉</div>
      <h2>입력 완료!</h2>
      <p>기사님 매칭이 시작됐어요</p>
      <p>잠시만 기다려주세요 🛵</p>
    </div>
  `;
}

init();
</script>
</body>
</html>
